<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DashSaúde</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Outfit:wght@100..900&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container-app">

        <aside class="barra-lateral">
            <div class="secao-perfil">
                <img id="imagem-perfil" src="doge.png" alt="perfil" class="imagem-perfil">
                <h2 id="nome-perfil">DashSaúde</h2>

                <div class="estatisticas">
                    <div class="caixa-estatistica">
                        <span id="total-atividades" class="numero-estatistica">0</span>
                        <span class="rotulo-estatistica">Qtd. Atividades</span>
                    </div>
                     <div class="caixa-estatistica">
                        <span id="total-calorias" class="numero-estatistica">0</span>
                        <span class="rotulo-estatistica">Qtd. Calorias</span>
                    </div>
                </div>
                 <button id="botao-criar-atividade" class="botao-criar" disabled>
                        <img src="progresso.svg" alt="progress">Atividade
                    </button>
            </div>
            <footer class="rodape-lateral">
                <p>DashSaude</p>
                <div class="icones-sociais">
                    <img src="instagram.svg">
                    <img src="tiktok.svg">
                    <img src="twitter.svg">
                </div>
                <p class="direitos-autorais">Copyright - 2026</p>
            </footer>
        </aside>

        <!--Comentário-->
        <main class="conteudo-principal">
            <header class="cabecalho-principal">
                <button id="botao-autenticacao" class="botao-login">Login</button>
            </header>

            <div class="filtros">
                <button class="botao-filtro" data-tipo="corrida">Corrida</button>
                <button class="botao-filtro" data-tipo="caminhada">Caminhada</button>
                <button class="botao-filtro" data-tipo="trilha">Trilha</button>
            </div>
        </main>
    </div>
    <script src="app.js"></script>
</body>
</html>
